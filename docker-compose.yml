services:
  postgres:
    image: postgres:alpine
    container_name: mysite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mysite
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mysite"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: